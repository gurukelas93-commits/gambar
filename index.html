<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Gambar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    .gallery-container {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .image-carousel {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      position: relative;
    }

    .image-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .gallery-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controls-bottom {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .counter {
      color: white;
    }
  </style>
 </head>
 <body>
  <div class="gallery-container">
   <div class="image-carousel" id="carousel">
    <div class="image-wrapper">
      <img id="galleryImage" class="gallery-image" src="" alt="Gallery image">
    </div>

    <button class="nav-btn" id="prevBtn" style="position: absolute; left: 20px; top: 50%;">
     <i data-lucide="chevron-left"></i>
    </button>

    <button class="nav-btn" id="nextBtn" style="position: absolute; right: 20px; top: 50%;">
     <i data-lucide="chevron-right"></i>
    </button>
   </div>

   <div class="controls-bottom">
    <button id="prevBtnBottom">Prev</button>
    <div class="counter">
     <span id="currentIndex">1</span> / <span id="totalCount">0</span>
    </div>
    <button id="nextBtnBottom">Next</button>
   </div>
  </div>

  <script>
    const galleryImages = [];

    let currentIndex = 0;

    const galleryImage = document.getElementById('galleryImage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtnBottom = document.getElementById('prevBtnBottom');
    const nextBtnBottom = document.getElementById('nextBtnBottom');
    const currentIndexSpan = document.getElementById('currentIndex');
    const totalCountSpan = document.getElementById('totalCount');

    async function loadFromGitHub() {
      try {
        const apiUrl = "https://api.github.com/repos/gurukelas93-commits/gambar/contents/Okt-25";
        const res = await fetch(apiUrl);

        if (!res.ok) throw new Error("Gagal ambil data");

        const data = await res.json();

        galleryImages.length = 0;

        data.forEach(file => {
          if (file.download_url && file.name.match(/\.(jpg|jpeg|png|webp)$/i)) {
            galleryImages.push(file.download_url);
          }
        });

        totalCountSpan.textContent = galleryImages.length;

        // 🔥 penting: load pertama
        if (galleryImages.length > 0) {
          loadImage(0);
        } else {
          galleryImage.alt = "Tidak ada gambar";
        }

      } catch (err) {
        console.error(err);
        galleryImage.alt = "Gagal memuat gambar";
      }
    }

    function loadImage(index) {
      if (galleryImages.length === 0) return;

      currentIndex = index;

      galleryImage.src = galleryImages[currentIndex];
      currentIndexSpan.textContent = currentIndex + 1;
    }

    function nextImage() {
      loadImage((currentIndex + 1) % galleryImages.length);
    }

    function prevImage() {
      loadImage((currentIndex - 1 + galleryImages.length) % galleryImages.length);
    }

    prevBtn.onclick = prevImage;
    nextBtn.onclick = nextImage;
    prevBtnBottom.onclick = prevImage;
    nextBtnBottom.onclick = nextImage;

    loadFromGitHub();
    lucide.createIcons();
  </script>
 </body>
</html>
