<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    html, body { height: 100%; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    .app-wrapper {
      height: 100%;
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow-y: auto;
    }

    .gallery-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 2rem;
    }

    .folder-selection {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .folder-btn {
      padding: 0.75rem 2rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      background: white;
      color: #667eea;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .folder-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .folder-btn.active {
      background: #667eea;
      color: white;
    }

    .image-viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 2rem;
    }

    .image-display {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      max-width: 600px;
    }

    .image-display img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .nav-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    .download-btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: #10b981;
      color: white;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      color: #999;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active { display: flex; }
  </style>
</head>

<body>
<div class="app-wrapper">
  <div class="gallery-container">

    <div class="folder-selection">
      <button class="folder-btn active" data-folder="Okt-25">📁 Oktober 25</button>
      <button class="folder-btn" data-folder="Maret-26">📁 Maret 26</button>
    </div>

    <div class="image-viewer">
      <div class="image-display">
        <img id="mainImage" style="display:none;">
        <div class="empty-state" id="emptyState">Tidak ada gambar</div>
      </div>

      <div id="imageCounter"></div>

      <div class="controls">
        <button id="prevBtn" class="nav-btn">◀</button>
        <button id="downloadBtn" class="download-btn">Download</button>
        <button id="nextBtn" class="nav-btn">▶</button>
      </div>
    </div>

  </div>
</div>

<script>
const folderPaths = {
  oktober: "Okt-25/",
  maret: "Maret-26/"
};

let galleries = {
  oktober: [],
  maret: []
};

let currentFolder = "oktober";
let currentIndex = 0;

const mainImage = document.getElementById("mainImage");
const emptyState = document.getElementById("emptyState");
const imageCounter = document.getElementById("imageCounter");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

document.querySelectorAll(".folder-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".folder-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFolder = btn.dataset.folder;
    currentIndex = 0;
    updateGallery();
  };
});

// 🔥 AUTO AMBIL SEMUA FILE DARI FOLDER (tanpa urutan)
async function loadImages(folderKey){
  const path = folderPaths[folderKey];
  const res = await fetch(path);
  const text = await res.text();

  const parser = new DOMParser();
  const htmlDoc = parser.parseFromString(text, "text/html");

  const links = [...htmlDoc.querySelectorAll("a")];

  const images = links
    .map(a => a.getAttribute("href"))
    .filter(href => href.match(/\.(jpg|jpeg|png|webp)$/i))
    .map(file => ({
      name: file,
      url: path + file
    }));

  return images;
}

// INIT
async function initGallery(){
  galleries.oktober = await loadImages("oktober");
  galleries.maret = await loadImages("maret");
  updateGallery();
}

function updateGallery(){
  const images = galleries[currentFolder];

  if(images.length === 0){
    mainImage.style.display = "none";
    emptyState.style.display = "block";
    imageCounter.textContent = "";
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  emptyState.style.display = "none";
  mainImage.style.display = "block";

  const img = images[currentIndex];
  mainImage.src = img.url;

  imageCounter.textContent = (currentIndex+1)+" / "+images.length;

  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === images.length-1;
}

prevBtn.onclick = ()=>{
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
};

nextBtn.onclick = ()=>{
  const images = galleries[currentFolder];
  if(currentIndex < images.length-1){
    currentIndex++;
    updateGallery();
  }
};

initGallery();
</script>

</body>
</html>
